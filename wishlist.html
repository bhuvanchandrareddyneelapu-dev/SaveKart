<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveKart - My Wishlist & Favorites</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">
            <img src="https://gemini.google.com/share/fa7e98c772b2.png" alt="SaveKart Logo">
            <h2>SaveKart</h2>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Categories</a>
            <a href="wishlist.html" class="active">Wishlist</a>
            <a href="cart.html">Cart</a>
            <a href="login.html" class="Login-btn">Login</a>
            <a href="signup.html" class="btn">Sign Up</a>
        </nav>
    </header>

    <div style="max-width:1100px; margin:40px auto; padding:0 20px;">
        <h1 style="text-align:center; font-size:36px; margin-bottom:30px; color:#38bdf8;"><i class="fa fa-heart" style="color:#ec4899;"></i> My Wishlist & Saved Products</h1>

        <div id="wishlistGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:25px;">
            <p style="text-align:center; grid-column:1/-1; padding:40px; color:#94a3b8;">Loading your saved items...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            const grid = document.getElementById("wishlistGrid");
            try {
                const items = await SaveKartAPI.getWishlist();
                if (!items || items.length === 0) {
                    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; background:#16233e; border-radius:20px;">
                        <i class="fa fa-heart-broken fa-3x" style="color:#64748b; margin-bottom:15px;"></i>
                        <h3 style="margin-bottom:10px;">Your wishlist is empty</h3>
                        <p style="color:#94a3b8; margin-bottom:20px;">Explore products and save them here for instant price alerts!</p>
                        <a href="products.html" class="btn" style="text-decoration:none; color:#fff;">Browse Products</a>
                    </div>`;
                    return;
                }

                grid.innerHTML = items.map(item => `
                    <div style="background:#16233e; padding:20px; border-radius:16px; text-align:center; position:relative;">
                        <img src="${item.product.mainImage}" style="width:140px; height:140px; object-fit:contain; margin-bottom:15px;">
                        <h3 style="font-size:18px; margin-bottom:10px;">${item.product.name}</h3>
                        <div style="color:#38bdf8; font-weight:700; font-size:20px; margin-bottom:15px;">₹${item.product.mrp || 0}</div>
                        <a href="product-detail.html?id=${item.product.id}" style="background:#5865ff; color:#fff; padding:10px 18px; border-radius:10px; text-decoration:none; display:inline-block; font-size:14px;">Compare Prices</a>
                    </div>
                `).join("");
            } catch (e) {
                grid.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#ef4444;">Please login to view your wishlist.</p>`;
            }
        });
    </script>
</body>
</html>
