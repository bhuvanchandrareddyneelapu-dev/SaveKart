name: SaveKart CI/CD Production Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Test Spring Boot Backend
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew test bootJar

      - name: Validate Web Frontend Assets
        run: |
          test -f index.html
          test -f products.html
          test -f product-detail.html
          test -f login.html
          test -f signup.html
          test -f style.css
